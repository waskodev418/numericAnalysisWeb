<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analisi numerica</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/keyboard.css">
</head>
<body>
  
  <main>
    <div>
        <label for="function">funzione: </label>
        <input type="text" id="function">
        <div id="keyboard"></div>
        <br><br>
        <label for="intervallo_a">A:</label>
        <input type="number" id="intervallo_a" step="0.0001" value="0">
        <label for="intervallo_b">B: </label>
        <input type="number" id="intervallo_b" step="0.0001" value="0">
        <label for="precisione">precisione decimale</label>
        <input type="number" id="precisione" step="1" min="1" value="1" max="9">
        <br>
        <button onclick="bisezione()">metodo bisezione</button>
    </div>
    <hr>
    <label for="res">risultato: </label>
    <input type="number" class="res" id="res" value="" readonly hidden>
    <br>
    <label for="steps">passi: </label>
    <input type="number" class="res" id="steps" value="" readonly hidden>
  </main>

  <script src="libraries/bisezione_module.js"></script>
  <script src="script/math.js"></script>
  <script src="script/utils.js"></script>
  <script>
    createScientificKeyboard();
  </script>
</body>
</html>
